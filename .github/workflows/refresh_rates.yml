name: Refresh Financial Rates (Daily Scraper)

on:
  schedule:
    # Run every day at 01:00 UTC (07:00 BST / 07:00 BDT)
    - cron: "0 1 * * *"
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape:
    name: Run Scrapy Spiders → Supabase
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scrapers/requirements.txt

      - name: Install scraper dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run Bangladesh Bank rates spider
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        working-directory: scrapers
        run: |
          scrapy crawl bangladesh_bank_tables \
            -s CLOSESPIDER_TIMEOUT=600 \
            -s LOG_LEVEL=INFO
        continue-on-error: true  # one spider failing should not block others

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::One or more scrapers failed. Check the logs above for details."
          echo "::warning::Financial rate data may be stale. Manual review recommended."
